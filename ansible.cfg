# ============================================================
# SEC-OPS LAB - Ansible Configuration
# ============================================================
# Controls global Ansible behavior. SSH is the sole transport
# for Linux, Windows (Win32-OpenSSH), and Android/Termux hosts.
# ============================================================

[defaults]
inventory           = ./inventory.ini
roles_path          = ./roles
remote_tmp          = /tmp/.ansible/tmp
host_key_checking   = False
retry_files_enabled = False
timeout             = 30
forks               = 10
vault_password_file = ./.vault_pass
stdout_callback     = ansible.builtin.default
result_format       = yaml

# Reduce SSH noise in output
deprecation_warnings = False

[privilege_escalation]
become        = False
become_method = sudo
become_ask_pass = False

[ssh_connection]
# Pipelining reduces the number of SSH connections needed,
# improving performance. Requires requiretty to be disabled
# in sudoers on Linux targets (default on Ubuntu 22.04).
pipelining    = True
ssh_args      = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
