---
# ============================================================
# group_vars/windows_machines.yml - Windows via SSH specifics
# ============================================================
# WHY: Windows Server 2019 & Windows 10 use Win32-OpenSSH.
# Setting ansible_shell_type=powershell tells Ansible to wrap
# commands in PowerShell syntax instead of /bin/sh, which is
# required for all win_* modules and raw PowerShell commands.
# ============================================================

ansible_connection: ssh
ansible_port: 22
ansible_shell_type: powershell

# No become on Windows via SSH — we rely on the 'ansible' user
# having local Administrator privileges.
