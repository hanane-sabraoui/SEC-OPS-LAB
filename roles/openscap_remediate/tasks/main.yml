---
# ============================================================
# Role: openscap_remediate — Auto-fix using OpenSCAP remediation
# ============================================================
# WHY: OpenSCAP can automatically remediate (fix) many CIS and
# ANSSI findings using the --remediate flag. This applies the
# SSG-provided Bash fix scripts directly to the system. Combined
# with the manual hardening role, this maximizes compliance score.
#
# NOTE: Remediation runs oscap in "eval + fix" mode. It evaluates
# each rule and if it fails, applies the associated fix script.
# Some fixes require a reboot to take full effect.
# ============================================================

# --- Step 1: Ensure OpenSCAP and SSG are installed ---
- name: "[REMEDIATE] Ensure OpenSCAP and SSG content are installed"
  ansible.builtin.apt:
    name:
      - libopenscap8
      - ssg-debderived
    state: present
    update_cache: yes
    cache_valid_time: 3600

# --- Step 2: Locate the SSG datastream ---
- name: "[REMEDIATE] Find SSG datastream file"
  ansible.builtin.find:
    paths: /usr/share/xml/scap/ssg/content/
    patterns: "ssg-ubuntu*-ds*.xml"
  register: ssg_files

- name: "[REMEDIATE] Set datastream path"
  ansible.builtin.set_fact:
    ssg_datastream: "{{ ssg_files.files | sort(attribute='path') | last | attr('path') }}"
  when: ssg_files.matched > 0

- name: "[REMEDIATE] Fail if no SSG content found"
  ansible.builtin.fail:
    msg: "No SSG datastream found. Install ssg-debderived."
  when: ssg_files.matched == 0

# --- Step 3: Create reports directory ---
- name: "[REMEDIATE] Create remediation reports directory"
  ansible.builtin.file:
    path: /tmp/openscap_reports
    state: directory
    mode: "0755"

# --- Step 4: Run CIS remediation ---
- name: "[REMEDIATE] Run CIS Level 1 Server auto-remediation"
  ansible.builtin.command:
    cmd: >
      oscap xccdf eval
      --remediate
      --profile xccdf_org.ssgproject.content_profile_cis_level1_server
      --report /tmp/openscap_reports/cis_remediation_report.html
      --results /tmp/openscap_reports/cis_remediation_results.xml
      {{ ssg_datastream }}
  register: cis_remediate
  # Exit code 2 = some rules still fail after remediation (expected)
  # Exit code 0 = all rules pass
  # Exit code 1 = scanner error
  failed_when: cis_remediate.rc == 1
  changed_when: cis_remediate.rc == 2 or cis_remediate.rc == 0

- name: "[REMEDIATE] Display CIS remediation summary"
  ansible.builtin.debug:
    msg: |
      === CIS Auto-Remediation Complete ===
      Exit code: {{ cis_remediate.rc }} (0=all pass, 2=some still fail)
      Remediation report: /tmp/openscap_reports/cis_remediation_report.html

# --- Step 5: Run ANSSI BP28 remediation ---
- name: "[REMEDIATE] Run ANSSI BP28 Enhanced auto-remediation"
  ansible.builtin.command:
    cmd: >
      oscap xccdf eval
      --remediate
      --profile xccdf_org.ssgproject.content_profile_anssi_bp28_enhanced
      --report /tmp/openscap_reports/anssi_remediation_report.html
      --results /tmp/openscap_reports/anssi_remediation_results.xml
      {{ ssg_datastream }}
  register: anssi_remediate
  failed_when: anssi_remediate.rc == 1
  changed_when: anssi_remediate.rc == 2 or anssi_remediate.rc == 0

- name: "[REMEDIATE] Display ANSSI remediation summary"
  ansible.builtin.debug:
    msg: |
      === ANSSI BP28 Auto-Remediation Complete ===
      Exit code: {{ anssi_remediate.rc }} (0=all pass, 2=some still fail)
      Remediation report: /tmp/openscap_reports/anssi_remediation_report.html

# --- Step 6: Extract remediation scores from XML ---
- name: "[REMEDIATE] Extract CIS remediation score"
  ansible.builtin.shell: |
    set -o pipefail
    TOTAL=$(grep -c '<rule-result' /tmp/openscap_reports/cis_remediation_results.xml 2>/dev/null || echo 0)
    PASS=$(grep -c 'result">pass</result' /tmp/openscap_reports/cis_remediation_results.xml 2>/dev/null || echo 0)
    FAIL=$(grep -c 'result">fail</result' /tmp/openscap_reports/cis_remediation_results.xml 2>/dev/null || echo 0)
    FIXED=$(grep -c 'result">fixed</result' /tmp/openscap_reports/cis_remediation_results.xml 2>/dev/null || echo 0)
    NOTAPPL=$(grep -c 'result">notapplicable</result' /tmp/openscap_reports/cis_remediation_results.xml 2>/dev/null || echo 0)
    CHECKED=$((PASS + FAIL + FIXED))
    if [ "$CHECKED" -gt 0 ]; then
      SCORE=$(( (PASS + FIXED) * 100 / CHECKED ))
    else
      SCORE=0
    fi
    echo "========================================"
    echo "  CIS REMEDIATION SCORE"
    echo "========================================"
    echo "Total rules  : $TOTAL"
    echo "Passed       : $PASS"
    echo "Fixed        : $FIXED"
    echo "Failed       : $FAIL"
    echo "Not applicable: $NOTAPPL"
    echo "SCORE        : ${SCORE}%"
    echo "========================================"
  args:
    executable: /bin/bash
  register: cis_score
  changed_when: false

- name: "[REMEDIATE] Display CIS remediation score"
  ansible.builtin.debug:
    msg: "{{ cis_score.stdout_lines }}"

- name: "[REMEDIATE] Extract ANSSI remediation score"
  ansible.builtin.shell: |
    set -o pipefail
    TOTAL=$(grep -c '<rule-result' /tmp/openscap_reports/anssi_remediation_results.xml 2>/dev/null || echo 0)
    PASS=$(grep -c 'result">pass</result' /tmp/openscap_reports/anssi_remediation_results.xml 2>/dev/null || echo 0)
    FAIL=$(grep -c 'result">fail</result' /tmp/openscap_reports/anssi_remediation_results.xml 2>/dev/null || echo 0)
    FIXED=$(grep -c 'result">fixed</result' /tmp/openscap_reports/anssi_remediation_results.xml 2>/dev/null || echo 0)
    NOTAPPL=$(grep -c 'result">notapplicable</result' /tmp/openscap_reports/anssi_remediation_results.xml 2>/dev/null || echo 0)
    CHECKED=$((PASS + FAIL + FIXED))
    if [ "$CHECKED" -gt 0 ]; then
      SCORE=$(( (PASS + FIXED) * 100 / CHECKED ))
    else
      SCORE=0
    fi
    echo "========================================"
    echo "  ANSSI BP28 REMEDIATION SCORE"
    echo "========================================"
    echo "Total rules  : $TOTAL"
    echo "Passed       : $PASS"
    echo "Fixed        : $FIXED"
    echo "Failed       : $FAIL"
    echo "Not applicable: $NOTAPPL"
    echo "SCORE        : ${SCORE}%"
    echo "========================================"
  args:
    executable: /bin/bash
  register: anssi_score
  changed_when: false

- name: "[REMEDIATE] Display ANSSI remediation score"
  ansible.builtin.debug:
    msg: "{{ anssi_score.stdout_lines }}"

# --- Step 7: Fetch remediation reports ---
- name: "[REMEDIATE] Ensure local reports directory"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports/linux/"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: no

- name: "[REMEDIATE] Fetch remediation reports to control node"
  ansible.builtin.fetch:
    src: "/tmp/openscap_reports/{{ item }}"
    dest: "{{ playbook_dir }}/../reports/linux/{{ inventory_hostname }}_{{ item }}"
    flat: yes
  loop:
    - cis_remediation_report.html
    - cis_remediation_results.xml
    - anssi_remediation_report.html
    - anssi_remediation_results.xml

- name: "[REMEDIATE] OpenSCAP auto-remediation complete"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════╗
      ║      OPENSCAP AUTO-REMEDIATION — COMPLETE                   ║
      ╠══════════════════════════════════════════════════════════════╣
      ║ Host     : {{ inventory_hostname }}
      ║ Profiles : CIS Level 1 Server + ANSSI BP28 Enhanced
      ║ Mode     : --remediate (evaluate + auto-fix)
      ║ Reports  : reports/linux/
      ║                                                              ║
      ║ NOTE: Some fixes require a REBOOT to take full effect.      ║
      ║ Run the rescan playbook after reboot for final scores.      ║
      ╚══════════════════════════════════════════════════════════════╝
