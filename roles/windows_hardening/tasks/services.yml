---
# ============================================================
# Windows service hardening — CIS 5.x
# ============================================================
# WHY: Unnecessary Windows services increase the attack surface.
# Disabling them reduces the number of listening ports and
# potential vulnerability targets.
# ============================================================

- name: "[SVC] Disable unnecessary Windows services"
  ansible.builtin.raw: |
    $servicesToDisable = @(
        # CIS 5.1: Bluetooth Support Service
        # WHY: Servers don't need Bluetooth — reduces wireless attack surface
        'bthserv',

        # CIS 5.6: Computer Browser
        # WHY: Legacy NetBIOS browsing service — exploitable for network enumeration
        'Browser',

        # CIS 5.14: IIS Admin Service (if not a web server)
        'IISADMIN',

        # CIS 5.19: Link-Layer Topology Discovery Mapper
        # WHY: Network mapping service — information disclosure risk
        'lltdsvc',

        # CIS 5.23: Microsoft iSCSI Initiator Service
        'MSiSCSI',

        # CIS 5.29: Print Spooler (if not a print server)
        # WHY: PrintNightmare (CVE-2021-34527) — one of the most exploited Windows vulns
        'Spooler',

        # CIS 5.30: Remote Desktop Configuration
        # WHY: Not needed when using SSH exclusively (our lab setup)
        'SessionEnv',

        # CIS 5.31: Remote Desktop Services
        'TermService',

        # CIS 5.32: Remote Desktop UserMode Port Redirector
        'UmRdpService',

        # CIS 5.36: Remote Registry
        # WHY: Allows remote modification of the registry — major attack vector
        'RemoteRegistry',

        # CIS 5.39: SNMP Service
        # WHY: SNMP v1/v2 transmit community strings in cleartext
        'SNMP',

        # CIS 5.44: Windows Error Reporting Service
        # WHY: Can leak crash dumps containing sensitive memory to Microsoft/network
        'WerSvc',

        # CIS 5.46: Windows Push Notifications System Service
        'WpnService',

        # CIS 5.48: Xbox services (all)
        'XblAuthManager',
        'XblGameSave',
        'XboxNetApiSvc',
        'XboxGipSvc'
    )

    $disabled = 0
    $skipped = 0
    foreach ($svc in $servicesToDisable) {
        $service = Get-Service -Name $svc -ErrorAction SilentlyContinue
        if ($service) {
            if ($service.Status -eq 'Running') {
                Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            }
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
            $disabled++
        } else {
            $skipped++
        }
    }

    Write-Output "Services disabled: $disabled | Not found/skipped: $skipped"
  register: svc_result
  changed_when: "'disabled' in svc_result.stdout"

- name: "[SVC] Display service hardening result"
  ansible.builtin.debug:
    msg: "{{ svc_result.stdout | trim }}"
