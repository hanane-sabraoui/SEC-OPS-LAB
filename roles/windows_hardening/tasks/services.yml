---
# ============================================================
# Windows service hardening — CIS 5.x
# ============================================================
# WHY: Unnecessary Windows services increase the attack surface.
# Disabling them reduces the number of listening ports and
# potential vulnerability targets.
# ============================================================

- name: "[SVC] Disable unnecessary Windows services"
  ansible.windows.win_shell: |
    # CIS 5.x: Disable unnecessary services to reduce attack surface
    # bthserv=Bluetooth, Browser=NetBIOS, IISADMIN=IIS, lltdsvc=LLTD
    # MSiSCSI=iSCSI, Spooler=PrintNightmare, SessionEnv/TermService/UmRdpService=RDP
    # RemoteRegistry=remote reg edit, SNMP=cleartext, WerSvc=error reporting
    # WpnService=push notif, Xbl*=Xbox services
    $servicesToDisable = "bthserv","Browser","IISADMIN","lltdsvc","MSiSCSI","Spooler","SessionEnv","TermService","UmRdpService","RemoteRegistry","SNMP","WerSvc","WpnService","XblAuthManager","XblGameSave","XboxNetApiSvc","XboxGipSvc"

    $disabled = 0
    $skipped = 0
    foreach ($svc in $servicesToDisable) {
        $service = Get-Service -Name $svc -ErrorAction SilentlyContinue
        if ($service) {
            if ($service.Status -eq 'Running') {
                Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            }
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
            $disabled++
        } else {
            $skipped++
        }
    }

    Write-Output "Services disabled: $disabled | Not found/skipped: $skipped"
  register: svc_result
  changed_when: "'disabled' in svc_result.stdout"

- name: "[SVC] Display service hardening result"
  ansible.builtin.debug:
    msg: "{{ svc_result.stdout | trim }}"
