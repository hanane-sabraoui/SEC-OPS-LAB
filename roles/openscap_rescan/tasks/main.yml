# --- Fetch reports ---
- name: "[RESCAN] Ensure local reports directory exists"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports/linux/"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: no

- name: "[RESCAN] Fetch post-hardening HTML reports"
  ansible.builtin.fetch:
    src: "/tmp/openscap_reports/{{ item }}"
    dest: "{{ playbook_dir }}/../reports/linux/{{ inventory_hostname }}_{{ item }}"
    flat: yes
  loop:
    - cis_post_hardening_report.html
    # NOTE: ANSSI profile not available in Ubuntu 22.04 SSG
    # - anssi_post_hardening_report.html
    - cis_post_hardening_results.xml
    # - anssi_post_hardening_results.xml

- name: "[RESCAN] Post-hardening scan complete"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════╗
      ║    POST-HARDENING OPENSCAP RESCAN — COMPLETE                ║
      ╠══════════════════════════════════════════════════════════════╣
      ║ Host     : {{ inventory_hostname }}
      ║ CIS      : exit {{ cis_rescan.rc }}
      ║ Compare HTML reports in reports/linux/ (baseline vs post)
      ╚══════════════════════════════════════════════════════════════╝
