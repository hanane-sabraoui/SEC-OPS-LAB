---
# ============================================================
# Role: hardeningkitty_remediate — Auto-fix CIS findings
# ============================================================
# WHY: HardeningKitty's "HailMary" mode automatically applies
# recommended values for all CIS findings. Combined with the
# manual windows_hardening role, this maximizes compliance.
#
# HailMary mode sets registry keys, security policies, and
# configurations to their CIS-recommended values.
# A reboot is strongly recommended after running this role.
# ============================================================

# --- Step 1: Ensure directories and module ---
- name: "[HKFIX] Ensure HardeningKitty is available"
  ansible.windows.win_shell: |
    if (!(Test-Path 'C:\SEC-OPS\HardeningKitty\HardeningKitty.psm1')) {
        Write-Output "ERROR: HardeningKitty not found. Run hardeningkitty_scan role first."
        exit 1
    }
    if (!(Test-Path 'C:\SEC-OPS\reports')) {
        New-Item -ItemType Directory -Path 'C:\SEC-OPS\reports' -Force | Out-Null
    }
    Import-Module 'C:\SEC-OPS\HardeningKitty\HardeningKitty.psm1' -Force
    Write-Output "HardeningKitty module ready"
  register: hk_check
  changed_when: false

# --- Step 2: Run HailMary (auto-remediation) ---
- name: "[HKFIX] Run HardeningKitty HailMary mode (auto-remediation)"
  ansible.windows.win_shell: |
    Import-Module 'C:\SEC-OPS\HardeningKitty\HardeningKitty.psm1' -Force

    $hkPath = 'C:\SEC-OPS\HardeningKitty'
    $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
    $logFile = "C:\SEC-OPS\reports\cis_hailmary_$timestamp.log"

    # Auto-detect OS and select finding list
    $osCaption = (Get-CimInstance Win32_OperatingSystem).Caption
    if ($osCaption -match 'Server 2019') {
        $listPattern = 'finding_list_cis_microsoft_windows_server_2019*'
    } elseif ($osCaption -match 'Server 2022') {
        $listPattern = 'finding_list_cis_microsoft_windows_server_2022*'
    } elseif ($osCaption -match 'Windows 10') {
        $listPattern = 'finding_list_cis_microsoft_windows_10*'
    } elseif ($osCaption -match 'Windows 11') {
        $listPattern = 'finding_list_cis_microsoft_windows_11*'
    } else {
        $listPattern = 'finding_list_cis*'
    }

    $findingList = Get-ChildItem "$hkPath\lists\$listPattern" -ErrorAction SilentlyContinue | Select-Object -First 1
    if (!$findingList) {
        $findingList = Get-ChildItem "$hkPath\lists\finding_list_cis*" -ErrorAction SilentlyContinue | Select-Object -First 1
    }

    if (!$findingList) {
        Write-Output "ERROR: No CIS finding list found"
        exit 1
    }

    Write-Output "OS: $osCaption"
    Write-Output "Finding List: $($findingList.Name)"
    Write-Output "Running HailMary mode (this applies ALL recommended settings)..."
    Write-Output "WARNING: This modifies system configuration. A reboot is recommended after."

    Invoke-HardeningKitty -Mode HailMary -Log -LogFile $logFile -FileFindingList $findingList.FullName -SkipRestorePoint

    Write-Output "HailMary remediation complete. Log: $logFile"
  register: hk_hailmary
  changed_when: true
  async: 900
  poll: 20

- name: "[HKFIX] Display HailMary output (last 30 lines)"
  ansible.builtin.debug:
    msg: "{{ hk_hailmary.stdout_lines[-30:] | default(hk_hailmary.stdout_lines) }}"

# --- Step 3: Fetch remediation log ---
- name: "[HKFIX] Ensure local reports directory"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports/windows/"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: no

- name: "[HKFIX] Find latest HailMary log"
  ansible.windows.win_shell: |
    (Get-ChildItem 'C:\SEC-OPS\reports\cis_hailmary_*.log' | Sort-Object LastWriteTime -Descending | Select-Object -First 1).FullName
  register: hm_log_path
  changed_when: false

- name: "[HKFIX] Fetch HailMary log to control node"
  ansible.builtin.fetch:
    src: "{{ hm_log_path.stdout | trim }}"
    dest: "{{ playbook_dir }}/../reports/windows/{{ inventory_hostname }}_cis_hailmary.log"
    flat: yes
  when: hm_log_path.stdout | trim | length > 0

- name: "[HKFIX] HardeningKitty auto-remediation complete"
  ansible.builtin.debug:
    msg: |
      ╔══════════════════════════════════════════════════════════════╗
      ║   HARDENINGKITTY HAILMARY REMEDIATION — COMPLETE            ║
      ╠══════════════════════════════════════════════════════════════╣
      ║ Host     : {{ inventory_hostname }}
      ║ Mode     : HailMary (auto-apply all CIS recommended values)
      ║ Log      : reports/windows/{{ inventory_hostname }}_cis_hailmary.log
      ║                                                              ║
      ║ IMPORTANT: Reboot the target for all changes to take effect. ║
      ║ Then run hardeningkitty_rescan to verify the final score.    ║
      ╚══════════════════════════════════════════════════════════════╝
