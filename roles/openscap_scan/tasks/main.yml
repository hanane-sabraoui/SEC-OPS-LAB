---
# ============================================================
# Role: openscap_scan — Install OpenSCAP & run baseline audit
# ============================================================
# WHY: OpenSCAP is the industry-standard SCAP-compliant scanner
# for Linux. We install it + the SCAP Security Guide (SSG)
# content, then run an XCCDF evaluation against the CIS profile
# for Ubuntu 22.04. This produces an HTML report showing the
# "before hardening" compliance score (Jalon 2 baseline).
#
# NOTE: ANSSI BP28 profile is not available in Ubuntu 22.04 SSG.
# Only CIS Level 1 Server profile is used.
# ============================================================

# --- Step 1: Install required packages ---
- name: "[OPENSCAP] Install OpenSCAP scanner and SSG content"
  ansible.builtin.apt:
    name:
      - libopenscap25      # OpenSCAP library + oscap CLI (Ubuntu 22.04+)
      - ssg-debderived     # SCAP Security Guide for Debian/Ubuntu
      - bzip2              # May be needed for OVAL content
    state: present
    update_cache: yes
    cache_valid_time: 3600
  # WHY: ssg-debderived provides ready-made XCCDF profiles
  # (CIS) specifically tuned for Debian-based distros.

# --- Step 2: Locate the SSG datastream file ---
- name: "[OPENSCAP] Find SSG datastream file for Ubuntu"
  ansible.builtin.find:
    paths: /usr/share/xml/scap/ssg/content/
    patterns: "ssg-ubuntu*-ds*.xml"
  register: ssg_files

- name: "[OPENSCAP] Set datastream path"
  ansible.builtin.set_fact:
    ssg_datastream: "{{ (ssg_files.files | sort(attribute='path') | last).path }}"
  when: ssg_files.matched > 0

- name: "[OPENSCAP] Fail if no SSG content found"
  ansible.builtin.fail:
    msg: "No SSG datastream file found in /usr/share/xml/scap/ssg/content/. Check ssg-debderived installation."
  when: ssg_files.matched == 0

# --- Step 3: List available profiles (informational) ---
- name: "[OPENSCAP] List available XCCDF profiles"
  ansible.builtin.command:
    cmd: "oscap info --profiles {{ ssg_datastream }}"
  register: available_profiles
  changed_when: false

- name: "[OPENSCAP] Display available profiles"
  ansible.builtin.debug:
    msg: "{{ available_profiles.stdout_lines }}"

# --- Step 4: Create reports directory ---
- name: "[OPENSCAP] Create reports directory on target"
  ansible.builtin.file:
    path: /tmp/openscap_reports
    state: directory
    mode: "0755"

# --- Step 5: Run CIS baseline scan ---
- name: "[OPENSCAP] Run CIS Level 1 Server baseline scan"
  ansible.builtin.command:
    cmd: >
      oscap xccdf eval
      --profile xccdf_org.ssgproject.content_profile_cis_level1_server
      --report /tmp/openscap_reports/cis_baseline_report.html
      --results /tmp/openscap_reports/cis_baseline_results.xml
      {{ ssg_datastream }}
  register: cis_scan
  # oscap returns exit code 2 when some rules fail (expected for
  # a blank/unhardened system). Only exit code 1 = scanner error.
  failed_when: cis_scan.rc == 1
  changed_when: false

- name: "[OPENSCAP] Display CIS scan summary"
  ansible.builtin.debug:
    msg: |
      === CIS Baseline Scan Complete ===
      Exit code: {{ cis_scan.rc }} (0=all pass, 2=some fail)
      HTML report: /tmp/openscap_reports/cis_baseline_report.html
      XML results: /tmp/openscap_reports/cis_baseline_results.xml

# --- Step 6: Run ANSSI BP28 Enhanced baseline scan ---
# NOTE: ANSSI profile not available in Ubuntu 22.04 SSG - commented out
