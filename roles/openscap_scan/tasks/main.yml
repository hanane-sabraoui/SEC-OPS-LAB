#       XML results: /tmp/openscap_reports/anssi_baseline_results.xml

# --- Step 7: Generate score summary from XML ---
- name: "[OPENSCAP] Extract CIS baseline score"
  ansible.builtin.shell: |
    set -o pipefail
    TOTAL=$(grep -c '<rule-result' /tmp/openscap_reports/cis_baseline_results.xml 2>/dev/null || echo 0)
    PASS=$(grep -c 'result">pass</result' /tmp/openscap_reports/cis_baseline_results.xml 2>/dev/null || echo 0)
    FAIL=$(grep -c 'result">fail</result' /tmp/openscap_reports/cis_baseline_results.xml 2>/dev/null || echo 0)
    NOTAPPL=$(grep -c 'result">notapplicable</result' /tmp/openscap_reports/cis_baseline_results.xml 2>/dev/null || echo 0)
    NOTCHK=$(grep -c 'result">notchecked</result' /tmp/openscap_reports/cis_baseline_results.xml 2>/dev/null || echo 0)
    CHECKED=$((PASS + FAIL))
    if [ "$CHECKED" -gt 0 ]; then
      SCORE=$(( PASS * 100 / CHECKED ))
    else
      SCORE=0
    fi
    echo "========================================"
    echo "  CIS BASELINE SCORE"
    echo "========================================"
    echo "Total rules    : $TOTAL"
    echo "Passed         : $PASS"
    echo "Failed         : $FAIL"
    echo "Not applicable : $NOTAPPL"
    echo "Not checked    : $NOTCHK"
    echo "SCORE          : ${SCORE}%"
    echo "========================================"
  args:
    executable: /bin/bash
  register: cis_score_raw
  changed_when: false

- name: "[OPENSCAP] Display CIS baseline score"
  ansible.builtin.debug:
    msg: "{{ cis_score_raw.stdout_lines }}"

