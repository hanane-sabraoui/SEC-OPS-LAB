#     flat: yes

- name: "[OPENSCAP] Fetch CIS XML results to control node"
  ansible.builtin.fetch:
    src: /tmp/openscap_reports/cis_baseline_results.xml
    dest: "{{ playbook_dir }}/../reports/linux/{{ inventory_hostname }}_cis_baseline.xml"
    flat: yes

