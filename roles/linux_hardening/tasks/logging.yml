---
# ============================================================
# Logging & auditing — CIS 4.1-4.2 / ANSSI R40-R42
# ============================================================
# WHY: Without proper logging and auditing, security incidents
# go undetected. auditd tracks system calls, file access, and
# privilege escalation at the kernel level — essential for
# forensics and compliance.
# ============================================================

# --- CIS 4.1.1: Ensure auditd is installed ---
- name: "[LOG] Install audit packages"
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
    state: present

# --- CIS 4.1.2: Ensure auditd is enabled ---
- name: "[LOG] Enable and start auditd"
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: yes

# --- CIS 4.1.3: Configure audit rules ---
- name: "[LOG] Deploy comprehensive audit rules"
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/99-hardening.rules
    content: |
      ## CIS / ANSSI Audit Rules — Managed by Ansible
      ## =============================================

      # CIS 4.1.3: Record date/time modifications
      # WHY: Timestamp tampering can hide attack timelines
      -a always,exit -F arch=b64 -S adjtimex -S settimeofday -k time-change
      -a always,exit -F arch=b32 -S adjtimex -S settimeofday -S stime -k time-change
      -a always,exit -F arch=b64 -S clock_settime -k time-change
      -w /etc/localtime -p wa -k time-change

      # CIS 4.1.4: Record user/group modifications
      # WHY: Detect unauthorized account creation or modification
      -w /etc/group -p wa -k identity
      -w /etc/passwd -p wa -k identity
      -w /etc/gshadow -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/security/opasswd -p wa -k identity

      # CIS 4.1.5: Record network environment changes
      # WHY: Network config changes could indicate lateral movement setup
      -a always,exit -F arch=b64 -S sethostname -S setdomainname -k system-locale
      -w /etc/issue -p wa -k system-locale
      -w /etc/issue.net -p wa -k system-locale
      -w /etc/hosts -p wa -k system-locale
      -w /etc/hostname -p wa -k system-locale

      # CIS 4.1.6: Record login/logout events
      -w /var/log/faillog -p wa -k logins
      -w /var/log/lastlog -p wa -k logins
      -w /var/log/tallylog -p wa -k logins

      # CIS 4.1.7: Record session initiation
      -w /var/run/utmp -p wa -k session
      -w /var/log/wtmp -p wa -k session
      -w /var/log/btmp -p wa -k session

      # CIS 4.1.8: Record permission modification (chmod, chown, etc.)
      # WHY: Unauthorized permission changes can create backdoors
      -a always,exit -F arch=b64 -S chmod -S fchmod -S fchmodat -F auid>=1000 -F auid!=4294967295 -k perm_mod
      -a always,exit -F arch=b64 -S chown -S fchown -S fchownat -S lchown -F auid>=1000 -F auid!=4294967295 -k perm_mod

      # CIS 4.1.9: Record unauthorized file access attempts
      # WHY: Failed access = someone probing for sensitive files
      -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=4294967295 -k access
      -a always,exit -F arch=b64 -S creat -S open -S openat -S truncate -S ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=4294967295 -k access

      # CIS 4.1.11: Record use of privilege escalation commands
      # WHY: sudo/su usage should always be audited
      -w /usr/bin/sudo -p x -k privileged
      -w /usr/bin/su -p x -k privileged

      # CIS 4.1.14: Record file deletion by users
      # WHY: Detect evidence destruction
      -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -F auid>=1000 -F auid!=4294967295 -k delete

      # CIS 4.1.15: Record sudoers modifications
      -w /etc/sudoers -p wa -k scope
      -w /etc/sudoers.d/ -p wa -k scope

      # CIS 4.1.16: Record kernel module loading/unloading
      # WHY: Rootkits often load kernel modules
      -w /sbin/insmod -p x -k modules
      -w /sbin/rmmod -p x -k modules
      -w /sbin/modprobe -p x -k modules
      -a always,exit -F arch=b64 -S init_module -S delete_module -k modules

      # Make rules immutable (requires reboot to change — anti-tampering)
      -e 2
    owner: root
    group: root
    mode: "0640"
  notify: restart auditd

# --- CIS 4.1.1.3: Configure auditd space management ---
- name: "[LOG] Configure auditd log rotation and space"
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^max_log_file ", line: "max_log_file = {{ harden_audit_max_log_file }}" }
    - { regexp: "^max_log_file_action", line: "max_log_file_action = keep_logs" }
    - { regexp: "^space_left_action", line: "space_left_action = {{ harden_audit_space_left_action }}" }
    - { regexp: "^admin_space_left_action", line: "admin_space_left_action = {{ harden_audit_admin_space_left_action }}" }
  loop_control:
    label: "{{ item.line }}"
  notify: restart auditd

# --- CIS 4.2.1: Ensure rsyslog is installed and running ---
- name: "[LOG] Ensure rsyslog is installed"
  ansible.builtin.apt:
    name: rsyslog
    state: present

- name: "[LOG] Enable rsyslog"
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: yes

# --- CIS 4.2.1.4: Ensure rsyslog default file permissions ---
- name: "[LOG] Set rsyslog file creation mode to 0640"
  ansible.builtin.lineinfile:
    path: /etc/rsyslog.conf
    regexp: '^\$FileCreateMode'
    line: "$FileCreateMode 0640"
    state: present
  notify: restart rsyslog
  # WHY: Log files should not be world-readable — they contain sensitive info
