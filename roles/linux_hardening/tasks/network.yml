---
# ============================================================
# Network hardening — CIS 3.4-3.5 / ANSSI R20-R22
# ============================================================
# WHY: A properly configured host firewall (nftables/ufw) is
# the last line of defence. Disabling unused protocols reduces
# the listening surface.
# ============================================================

# --- CIS 3.4.1.1: Ensure UFW is installed ---
- name: "[NET] Ensure UFW is installed"
  ansible.builtin.apt:
    name: ufw
    state: present

# --- CIS 3.4.1.2: Enable UFW with default deny ---
- name: "[NET] Set UFW default policies"
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    # WHY: Default deny = whitelist model. Only explicitly allowed traffic passes.
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
    - { direction: routed, policy: deny }
  loop_control:
    label: "{{ item.direction }} → {{ item.policy }}"

# --- CIS 3.4.1.3: Allow SSH (critical — or we lose access!) ---
- name: "[NET] Allow SSH through firewall"
  community.general.ufw:
    rule: allow
    port: "{{ harden_ssh_port }}"
    proto: tcp
    comment: "CIS: Allow SSH"
  # WHY: This MUST come before enabling UFW, or we lock ourselves out

# --- CIS 3.4.1.4: Enable UFW ---
- name: "[NET] Enable UFW"
  community.general.ufw:
    state: enabled
  # WHY: Firewall rules are useless if the firewall isn't running

# --- CIS 3.4.1.5: Enable UFW logging ---
- name: "[NET] Enable UFW logging"
  community.general.ufw:
    logging: "on"
  # WHY: Firewall logs help detect scanning and intrusion attempts

# --- CIS 3.1.1: Disable IPv6 if not required ---
- name: "[NET] Disable IPv6 via sysctl (if configured)"
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
  when: harden_ipv6_disable | bool
  # WHY: If IPv6 isn't used, it's attack surface — disable it

# --- CIS 3.5.1: Disable DCCP protocol ---
- name: "[NET] Disable unused network protocols"
  ansible.builtin.copy:
    dest: "/etc/modprobe.d/{{ item }}.conf"
    content: |
      # CIS: Disable {{ item }} protocol
      # WHY: Unused protocol = unnecessary attack surface
      install {{ item }} /bin/true
      blacklist {{ item }}
    owner: root
    group: root
    mode: "0644"
  loop:
    - dccp     # Datagram Congestion Control Protocol
    - sctp     # Stream Control Transmission Protocol
    - rds      # Reliable Datagram Sockets
    - tipc     # Transparent Inter-Process Communication
